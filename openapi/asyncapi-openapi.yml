openapi: 3.1.0
info:
  title: AsyncAPI Server API
  version: "1.0"
  description: |
    The AsyncAPI Server API exposes the official AsyncAPI tooling
    (validation, parsing, conversion, code generation, bundling, diffing)
    over HTTP. It is open source under the AsyncAPI Initiative (now part of
    the AsyncAPI CLI repository) and can be self-hosted via Docker.

    Note: The AsyncAPI specification itself is a documentation/specification
    standard, not an API. This document covers the companion AsyncAPI Server
    API which provides the runtime HTTP surface.
  contact:
    name: AsyncAPI Initiative
    url: https://www.asyncapi.com
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
servers:
  - url: http://localhost
    description: Self-hosted AsyncAPI Server API
tags:
  - name: Validate
  - name: Parse
  - name: Convert
  - name: Generate
  - name: Bundle
  - name: Diff
  - name: Help
paths:
  /validate:
    post:
      tags: [Validate]
      summary: Validate an AsyncAPI document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [asyncapi]
              properties:
                asyncapi:
                  description: AsyncAPI document (object, string, or URL)
                  oneOf:
                    - { type: object }
                    - { type: string }
      responses:
        "204": { description: Document is valid }
        "400": { $ref: "#/components/responses/Problem" }
        "422": { $ref: "#/components/responses/Problem" }
  /parse:
    post:
      tags: [Parse]
      summary: Parse an AsyncAPI document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [asyncapi]
              properties:
                asyncapi:
                  oneOf:
                    - { type: object }
                    - { type: string }
      responses:
        "200":
          description: Parsed document
          content:
            application/json:
              schema:
                type: object
                properties:
                  parsed: { type: string }
        "422": { $ref: "#/components/responses/Problem" }
  /convert:
    post:
      tags: [Convert]
      summary: Convert an AsyncAPI document to another version or format
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [asyncapi]
              properties:
                asyncapi:
                  oneOf:
                    - { type: object }
                    - { type: string }
                version:
                  type: string
                  description: Target AsyncAPI spec version
                language:
                  type: string
                  enum: [yaml, json]
      responses:
        "200":
          description: Converted document
          content:
            application/json:
              schema:
                type: object
                properties:
                  converted:
                    oneOf:
                      - { type: object }
                      - { type: string }
        "422": { $ref: "#/components/responses/Problem" }
  /generate:
    post:
      tags: [Generate]
      summary: Generate code or documentation from an AsyncAPI document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [asyncapi, template]
              properties:
                asyncapi:
                  oneOf:
                    - { type: object }
                    - { type: string }
                template:
                  type: string
                  description: Generator template (e.g. @asyncapi/html-template)
                parameters:
                  type: object
                  additionalProperties: true
      responses:
        "200":
          description: Generated artifacts (zip)
          content:
            application/zip:
              schema:
                type: string
                format: binary
        "422": { $ref: "#/components/responses/Problem" }
  /bundle:
    post:
      tags: [Bundle]
      summary: Bundle multiple AsyncAPI documents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [asyncapis]
              properties:
                asyncapis:
                  type: array
                  items:
                    oneOf:
                      - { type: object }
                      - { type: string }
                base:
                  description: Base document to bundle into
                  oneOf:
                    - { type: object }
                    - { type: string }
      responses:
        "200":
          description: Bundled document
          content:
            application/json:
              schema:
                type: object
                properties:
                  bundled:
                    oneOf:
                      - { type: object }
                      - { type: string }
        "422": { $ref: "#/components/responses/Problem" }
  /diff:
    post:
      tags: [Diff]
      summary: Diff two AsyncAPI documents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [asyncapis]
              properties:
                asyncapis:
                  type: array
                  minItems: 2
                  maxItems: 2
                  items:
                    oneOf:
                      - { type: object }
                      - { type: string }
      responses:
        "200":
          description: Diff result
          content:
            application/json:
              schema:
                type: object
                properties:
                  diff:
                    oneOf:
                      - { type: object }
                      - { type: string }
        "422": { $ref: "#/components/responses/Problem" }
  /help:
    get:
      tags: [Help]
      summary: Retrieve command and endpoint help
      responses:
        "200":
          description: Help payload
components:
  responses:
    Problem:
      description: RFC 7807 problem response
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
  schemas:
    Problem:
      type: object
      properties:
        type:   { type: string, format: uri }
        title:  { type: string }
        status: { type: integer }
        detail: { type: string }
        instance: { type: string }
